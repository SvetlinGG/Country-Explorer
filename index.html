<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles/base.css">
    <title>Country Explorer</title>
  </head>
  <body>
    <header>
      <div class="container">
        <div class="logo">
          <span class="logo-text">
            <span class="logo-title">Country Explorer</span>
            <span class="logo-subtitle">Discover the World</span>
          </span>
        </div>
      </div>
    </header>
    <div id="app">
      <div class="nav-buttons">
        <button class="glass-btn" data-type="continent">
          <span class="glass-btn__icon">🌍</span>
          <span class="glass-btn__label">Continent</span>
        </button>
        <button class="glass-btn" data-type="country">
          <span class="glass-btn__icon">🏳️</span>
          <span class="glass-btn__label">Country</span>
        </button>
        <button class="glass-btn" data-type="region">
          <span class="glass-btn__icon">📍</span>
          <span class="glass-btn__label">Region</span>
        </button>
      </div>
    </div>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
